<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUTREPD — Outperform Your Limits</title>
  <meta name="description" content="OUTREPD helps you track workouts, crush goals, and push beyond your personal records. Download on the App Store.">
  <meta name="theme-color" content="#000000">

  <!-- Open Graph -->
  <meta property="og:title" content="OUTREPD — Outperform Your Limits">
  <meta property="og:description" content="Track workouts, crush goals, and push beyond your personal records.">
  <meta property="og:type" content="website">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Favicon (inline SVG data URI using brand colors) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23000'/><text x='50' y='62' font-family='Arial,sans-serif' font-size='28' font-weight='800' fill='%2300AAFF' text-anchor='middle'>OUT</text></svg>">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========================================
       NAVIGATION
       ======================================== -->
  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="/" class="nav-brand" id="nav-brand">
        <img src="assets/logo.png" alt="OUTREPD Logo" class="nav-brand__icon" id="nav-logo">
        <span class="nav-brand__name">OUTREPD</span>
      </a>
      <a href="#" class="nav-cta" id="nav-download-btn">
        Download OUTREPD
      </a>
    </div>
  </nav>

  <!-- ========================================
       HERO SECTION
       ======================================== -->
  <main>
    <section class="hero" id="hero">
      <div class="hero__grid container">
        <div class="hero__left">
          <h1 class="hero__headline" id="hero-headline">
            Your Next Rival is Waiting.
          </h1>
          <p class="hero__subheadline" id="hero-subheadline">
            Match with fitness rivals at your skill level, enter real-time workout face-offs, and climb the global leaderboards.
          </p>
          <!-- App Store Badge -->
          <div class="hero__store-badge" id="store-badge">
            <a href="#" class="store-badge-link" id="appstore-link" aria-label="Download on the App Store">
              <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/white/en-us?size=250x83" alt="Download on the App Store">
            </a>
          </div>
        </div>

        <div class="hero__right">
          <!-- App Mockup -->
          <div class="hero__mockup-wrapper" id="hero-mockup">
            <div class="hero__mockup">
              <img src="assets/iphone-mockup.svg" alt="OUTREPD App Mockup" class="hero__mockup-img" id="mockup-img">
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ========================================
       FOOTER
       ======================================== -->
  <footer class="footer" id="footer">
    <div class="container">
      <div class="footer__links">
        <a href="/privacy" class="footer__link" id="footer-privacy">Privacy Policy</a>
        <span class="footer__separator">·</span>
        <a href="/terms" class="footer__link" id="footer-terms">Terms of Service</a>
      </div>
      <p class="footer__copy">&copy; 2026 OUTREPD. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
